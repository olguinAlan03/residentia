<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    Alias /plugins /var/www/html/plugins
    Alias /dist    /var/www/html/dist
    Alias /css     /var/www/html/css

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/plugins>
        Options -Indexes
        Require all granted
    </Directory>

    <Directory /var/www/html/dist>
        Options -Indexes
        Require all granted
    </Directory>

    <Directory /var/www/html/css>
        Options -Indexes
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
